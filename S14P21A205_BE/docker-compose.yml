services:
  backend:
    build: .
    env_file:
      - .env.prod
    environment:
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
    expose:
      - "8080"
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_started
    env_file:
      - .env.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/nginx/docker:/etc/nginx/templates:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    command: >
      /bin/sh -c "
      if [ -n \"$$NGINX_SSL_CERT_PATH\" ] && [ -n \"$$NGINX_SSL_KEY_PATH\" ] &&
         [ -f \"$$NGINX_SSL_CERT_PATH\" ] && [ -f \"$$NGINX_SSL_KEY_PATH\" ]; then
        envsubst '$$NGINX_SERVER_NAME $$NGINX_SSL_CERT_PATH $$NGINX_SSL_KEY_PATH' < /etc/nginx/templates/default.https.conf.template > /etc/nginx/conf.d/default.conf;
      else
        envsubst '$$NGINX_SERVER_NAME' < /etc/nginx/templates/default.http.conf.template > /etc/nginx/conf.d/default.conf;
      fi
      && nginx -t
      && nginx -g 'daemon off;'
      "
    restart: unless-stopped

volumes:
  redis_data:
