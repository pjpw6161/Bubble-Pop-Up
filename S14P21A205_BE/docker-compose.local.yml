services:
  mysql:
    image: mysql:8.4
    command: --default-time-zone=+09:00
    ports:
      - "${DB_PORT:-13306}:3306"
    environment:
      TZ: Asia/Seoul
      MYSQL_DATABASE: ${DB_NAME:-mydb}
      MYSQL_USER: ${DB_USERNAME:-myuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-mypassword}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    env_file:
      - ./hadoop.env
    volumes:
      - namenode_data:/hadoop/dfs/name

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    depends_on:
      - namenode
    env_file:
      - ./hadoop.env
    volumes:
      - datanode_data:/hadoop/dfs/data

  hdfs-init:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hdfs-init
    profiles:
      - hdfs-init
    depends_on:
      - namenode
      - datanode
    volumes:
      - ./data:/local-data
    env_file:
      - ./hadoop.env
    command: bash /local-data/init-hdfs.sh
    restart: "no"

  spark-master:
    build:
      context: ./spark
      target: master
    container_name: spark-master
    ports:
      - "8082:8080"
      - "7077:7077"
    env_file:
      - ./hadoop.env
    environment:
      - INIT_DAEMON_STEP=setup_spark
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./spark/jobs:/opt/spark-jobs

  spark-worker:
    build:
      context: ./spark
      target: worker
    container_name: spark-worker
    depends_on:
      - spark-master
    ports:
      - "8083:8081"
    env_file:
      - ./hadoop.env
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    volumes:
      - ./spark/jobs:/opt/spark-jobs

  spark-etl:
    build:
      context: ./spark
      target: master
    container_name: spark-etl
    profiles:
      - spark-etl
    depends_on:
      spark-master:
        condition: service_started
      spark-worker:
        condition: service_started
      hdfs-init:
        condition: service_completed_successfully
    env_file:
      - ./hadoop.env
    volumes:
      - ./spark/jobs:/opt/spark-jobs
    command: bash /opt/spark-jobs/run-etl.sh
    restart: "no"

volumes:
  mysql_data:
  namenode_data:
  datanode_data:
