global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

  - job_name: monitoring-node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: spring-backend
    metrics_path: /actuator/prometheus
    scheme: https
    static_configs:
      - targets:
          - j14a205.p.ssafy.io

  - job_name: web-node-exporter
    static_configs:
      - targets:
          - web-node-exporter-tunnel:19100

  - job_name: data-node-exporter
    static_configs:
      - targets:
          - data-node-exporter-tunnel:19101
