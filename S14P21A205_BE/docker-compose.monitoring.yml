services:
  node-exporter:
    image: prom/node-exporter
    container_name: monitoring-node-exporter
    command:
      - --path.rootfs=/host
    pid: host
    restart: unless-stopped
    volumes:
      - /:/host:ro,rslave

  web-node-exporter-tunnel:
    build:
      context: ./monitoring/tunnel
    container_name: monitoring-web-node-exporter-tunnel
    environment:
      SSH_HOST: ${WEB_SCRAPE_SSH_HOST}
      SSH_USER: ${WEB_SCRAPE_SSH_USER:-ubuntu}
      REMOTE_HOST: 127.0.0.1
      REMOTE_PORT: 9100
      LOCAL_PORT: 19100
    volumes:
      - ./monitoring/secrets:/run/secrets:ro
    restart: unless-stopped

  data-node-exporter-tunnel:
    build:
      context: ./monitoring/tunnel
    container_name: monitoring-data-node-exporter-tunnel
    environment:
      SSH_HOST: ${DATA_SCRAPE_SSH_HOST}
      SSH_USER: ${DATA_SCRAPE_SSH_USER:-ubuntu}
      REMOTE_HOST: 127.0.0.1
      REMOTE_PORT: 9100
      LOCAL_PORT: 19101
    volumes:
      - ./monitoring/secrets:/run/secrets:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: monitoring-prometheus
    depends_on:
      - node-exporter
      - web-node-exporter-tunnel
      - data-node-exporter-tunnel
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-7d}
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: monitoring-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager
    container_name: monitoring-alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
