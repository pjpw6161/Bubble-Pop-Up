stages:
  - build
  - deploy

variables:
  BACKEND_DIR: "S14P21A205_BE"
  FRONTEND_DIR: "S14P21A205_FE"
  WEB_USER: "ubuntu"
  WEB_APP_DIR: "/home/ubuntu/S14P21A205"
  DATA_USER: "ubuntu"
  DATA_APP_DIR: "/home/ubuntu/S14P21A205-data"
  MONITOR_USER: "ubuntu"
  MONITOR_APP_DIR: "/home/ubuntu/S14P21A205-monitoring"

build-backend:
  stage: build
  image: eclipse-temurin:17-jdk
  script:
    - cd "$BACKEND_DIR"
    - chmod +x ./gradlew
    - ./gradlew clean bootJar -x test
    - cp build/libs/*-SNAPSHOT.jar build/libs/app.jar
  artifacts:
    expire_in: 1 day
    paths:
      - S14P21A205_BE/build/libs/app.jar
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

build-frontend:
  stage: build
  image: node:22-alpine
  script:
    - cd "$FRONTEND_DIR"
    - test -d public/unity || { echo "Missing $FRONTEND_DIR/public/unity"; exit 1; }
    - npm ci
    - npm run build
  artifacts:
    expire_in: 1 day
    paths:
      - S14P21A205_FE/dist/
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

bootstrap-webserver:
  stage: deploy
  image: alpine:3.20
  when: manual
  before_script:
    - apk add --no-cache openssh-client bash rsync
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$WEB_SERVER_IP" >> ~/.ssh/known_hosts
  script:
    - ssh "$WEB_USER@$WEB_SERVER_IP" "mkdir -p '$WEB_APP_DIR/ops'"
    - rsync -az "$BACKEND_DIR/ops/" "$WEB_USER@$WEB_SERVER_IP:$WEB_APP_DIR/ops/"
    - ssh "$WEB_USER@$WEB_SERVER_IP" "cd '$WEB_APP_DIR' && sudo DEPLOY_USER='$WEB_USER' APP_DIR='$WEB_APP_DIR' bash ops/scripts/bootstrap_ec2.sh"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

bootstrap-data-server:
  stage: deploy
  image: alpine:3.20
  when: manual
  before_script:
    - apk add --no-cache openssh-client bash rsync
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$DATA_SERVER_IP" >> ~/.ssh/known_hosts
  script:
    - ssh "$DATA_USER@$DATA_SERVER_IP" "mkdir -p '$DATA_APP_DIR/ops'"
    - rsync -az "$BACKEND_DIR/ops/" "$DATA_USER@$DATA_SERVER_IP:$DATA_APP_DIR/ops/"
    - ssh "$DATA_USER@$DATA_SERVER_IP" "cd '$DATA_APP_DIR' && sudo DEPLOY_USER='$DATA_USER' APP_DIR='$DATA_APP_DIR' bash ops/scripts/bootstrap_data_ec2.sh"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

bootstrap-monitoring-server:
  stage: deploy
  image: alpine:3.20
  when: manual
  before_script:
    - apk add --no-cache openssh-client bash rsync
    - mkdir -p ~/.ssh
    - printf '%s' "${MONITOR_SSH_PRIVATE_KEY:-$SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$MONITOR_SERVER_IP" >> ~/.ssh/known_hosts
  script:
    - ssh "$MONITOR_USER@$MONITOR_SERVER_IP" "mkdir -p '$MONITOR_APP_DIR/ops'"
    - rsync -az "$BACKEND_DIR/ops/" "$MONITOR_USER@$MONITOR_SERVER_IP:$MONITOR_APP_DIR/ops/"
    - ssh "$MONITOR_USER@$MONITOR_SERVER_IP" "cd '$MONITOR_APP_DIR' && sudo DEPLOY_USER='$MONITOR_USER' APP_DIR='$MONITOR_APP_DIR' bash ops/scripts/bootstrap_monitoring_ec2.sh"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

deploy-web:
  stage: deploy
  image: alpine:3.20
  needs:
    - build-backend
    - build-frontend
  before_script:
    - apk add --no-cache openssh-client bash rsync
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$WEB_SERVER_IP" >> ~/.ssh/known_hosts
  script:
    - ssh "$WEB_USER@$WEB_SERVER_IP" "mkdir -p '$WEB_APP_DIR/build/libs' '$WEB_APP_DIR/ops' '$WEB_APP_DIR/frontend/dist'"
    - rsync -az "$BACKEND_DIR/Dockerfile" "$BACKEND_DIR/.dockerignore" "$BACKEND_DIR/docker-compose.yml" "$WEB_USER@$WEB_SERVER_IP:$WEB_APP_DIR/"
    - rsync -az "$BACKEND_DIR/ops/" "$WEB_USER@$WEB_SERVER_IP:$WEB_APP_DIR/ops/"
    - rsync -az --delete "$FRONTEND_DIR/dist/" "$WEB_USER@$WEB_SERVER_IP:$WEB_APP_DIR/frontend/dist/"
    - scp "$BACKEND_DIR/build/libs/app.jar" "$WEB_USER@$WEB_SERVER_IP:$WEB_APP_DIR/build/libs/app.jar"
    - |
      if [ -n "${PROD_ENV_FILE:-}" ]; then
        printf '%s\n' "$PROD_ENV_FILE" > .env.prod
      elif [ -n "${PROD_ENV_FILE_B64:-}" ]; then
        printf '%s' "$PROD_ENV_FILE_B64" | base64 -d > .env.prod
      else
        echo "Missing PROD_ENV_FILE or PROD_ENV_FILE_B64"
        exit 1
      fi
    - sed -i 's/\r$//' .env.prod
    - grep '^NGINX_SERVER_NAME=' .env.prod
    - scp .env.prod "$WEB_USER@$WEB_SERVER_IP:$WEB_APP_DIR/.env.prod"
    - ssh "$WEB_USER@$WEB_SERVER_IP" "cd '$WEB_APP_DIR' && docker compose down && docker compose up -d --build --force-recreate --remove-orphans && docker image prune -f"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

deploy-web-exporter:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client bash rsync
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$WEB_SERVER_IP" >> ~/.ssh/known_hosts
  script:
    - ssh "$WEB_USER@$WEB_SERVER_IP" "mkdir -p '$WEB_APP_DIR'"
    - rsync -az "$BACKEND_DIR/docker-compose.exporter.yml" "$WEB_USER@$WEB_SERVER_IP:$WEB_APP_DIR/"
    - ssh "$WEB_USER@$WEB_SERVER_IP" "cd '$WEB_APP_DIR' && docker compose -p web-exporter -f docker-compose.exporter.yml down && docker compose -p web-exporter -f docker-compose.exporter.yml up -d --force-recreate --remove-orphans && docker image prune -f"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

deploy-data:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client bash rsync
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$DATA_SERVER_IP" >> ~/.ssh/known_hosts
  script:
    - ssh "$DATA_USER@$DATA_SERVER_IP" "mkdir -p '$DATA_APP_DIR/data' '$DATA_APP_DIR/spark/jobs'"
    - rsync -az "$BACKEND_DIR/docker-compose.data.yml" "$BACKEND_DIR/hadoop.env" "$DATA_USER@$DATA_SERVER_IP:$DATA_APP_DIR/"
    - rsync -az "$BACKEND_DIR/data/" "$DATA_USER@$DATA_SERVER_IP:$DATA_APP_DIR/data/"
    - rsync -az "$BACKEND_DIR/spark/" "$DATA_USER@$DATA_SERVER_IP:$DATA_APP_DIR/spark/"
    - ssh "$DATA_USER@$DATA_SERVER_IP" "cd '$DATA_APP_DIR' && docker compose -f docker-compose.data.yml down && docker compose -f docker-compose.data.yml up -d --build --force-recreate --remove-orphans && docker image prune -f"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

deploy-data-exporter:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client bash rsync
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$DATA_SERVER_IP" >> ~/.ssh/known_hosts
  script:
    - ssh "$DATA_USER@$DATA_SERVER_IP" "mkdir -p '$DATA_APP_DIR'"
    - rsync -az "$BACKEND_DIR/docker-compose.exporter.yml" "$DATA_USER@$DATA_SERVER_IP:$DATA_APP_DIR/"
    - ssh "$DATA_USER@$DATA_SERVER_IP" "cd '$DATA_APP_DIR' && docker compose -p data-exporter -f docker-compose.exporter.yml down && docker compose -p data-exporter -f docker-compose.exporter.yml up -d --force-recreate --remove-orphans && docker image prune -f"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

deploy-monitoring:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client bash rsync
    - mkdir -p ~/.ssh
    - printf '%s' "${MONITOR_SSH_PRIVATE_KEY:-$SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$MONITOR_SERVER_IP" >> ~/.ssh/known_hosts
  script:
    - ssh "$MONITOR_USER@$MONITOR_SERVER_IP" "mkdir -p '$MONITOR_APP_DIR/monitoring' '$MONITOR_APP_DIR/monitoring/secrets'"
    - rsync -az "$BACKEND_DIR/docker-compose.monitoring.yml" "$MONITOR_USER@$MONITOR_SERVER_IP:$MONITOR_APP_DIR/"
    - rsync -az "$BACKEND_DIR/monitoring/" "$MONITOR_USER@$MONITOR_SERVER_IP:$MONITOR_APP_DIR/monitoring/"
    - |
      {
        printf 'WEB_SCRAPE_SSH_HOST=%s\n' "$WEB_SERVER_IP"
        printf 'WEB_SCRAPE_SSH_USER=%s\n' "$WEB_USER"
        printf 'DATA_SCRAPE_SSH_HOST=%s\n' "$DATA_SERVER_IP"
        printf 'DATA_SCRAPE_SSH_USER=%s\n' "$DATA_USER"
        if [ -n "${MONITORING_ENV_FILE:-}" ]; then
          printf '%s\n' "$MONITORING_ENV_FILE"
        fi
      } > .env.monitoring
    - sed -i 's/\r$//' .env.monitoring
    - scp .env.monitoring "$MONITOR_USER@$MONITOR_SERVER_IP:$MONITOR_APP_DIR/.env.monitoring"
    - printf '%s' "${SCRAPE_SSH_PRIVATE_KEY:-$SSH_PRIVATE_KEY}" | tr -d '\r' > exporter_tunnel_id_rsa
    - chmod 600 exporter_tunnel_id_rsa
    - scp exporter_tunnel_id_rsa "$MONITOR_USER@$MONITOR_SERVER_IP:$MONITOR_APP_DIR/monitoring/secrets/exporter_tunnel_id_rsa"
    - ssh "$MONITOR_USER@$MONITOR_SERVER_IP" "chmod 600 '$MONITOR_APP_DIR/monitoring/secrets/exporter_tunnel_id_rsa'"
    - |
      ssh "$MONITOR_USER@$MONITOR_SERVER_IP" "cd '$MONITOR_APP_DIR' && \
      if [ -f .env.monitoring ]; then \
        cp .env.monitoring .env && \
        docker compose --env-file .env.monitoring -f docker-compose.monitoring.yml down && \
        docker compose --env-file .env.monitoring -f docker-compose.monitoring.yml up -d --force-recreate --remove-orphans && \
        docker image prune -f; \
      else \
        docker compose -f docker-compose.monitoring.yml down && \
        docker compose -f docker-compose.monitoring.yml up -d --force-recreate --remove-orphans && \
        docker image prune -f; \
      fi"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

setup-web-https:
  stage: deploy
  image: alpine:3.20
  when: manual
  before_script:
    - apk add --no-cache openssh-client bash
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$WEB_SERVER_IP" >> ~/.ssh/known_hosts
  script:
    - ssh "$WEB_USER@$WEB_SERVER_IP" "cd '$WEB_APP_DIR' && DOMAIN='$WEB_DOMAIN' CERTBOT_EMAIL='$CERTBOT_EMAIL' APP_DIR='$WEB_APP_DIR' bash ops/scripts/setup_server_nginx.sh"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
